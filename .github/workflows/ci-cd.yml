name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      MAX_RETRIES: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Reset flaky state
        run: rm -f flaky.marker flaky.counter

      - name: Run tests
        run: |
          chmod +x scripts/run_tests_with_attempts.sh
          bash scripts/run_tests_with_attempts.sh

      - name: Show flaky summary
        run: cat artifacts/test-attempts/flaky_summary.json || echo "No summary"
