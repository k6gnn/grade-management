name: CI/CD Pipeline with Self-Healing Mechanisms

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# ─────────────────────────────────────────────
# ENVIRONMENT VARIABLES
# Used by Mechanism 9: Environment Variable Verification
# ─────────────────────────────────────────────
env:
  JAVA_VERSION: '21'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MAVEN_OPTS: '-Xmx1024m'
  APP_NAME: 'grade-management'
  BUILD_TIMEOUT_MINUTES: '10'
  TEST_TIMEOUT_MINUTES: '10'
  PACKAGE_TIMEOUT_MINUTES: '5'
  DEPLOY_TIMEOUT_MINUTES: '5'
  MAX_RETRIES: '3'
  FLAKY_PROBE_RUNS: '2'

jobs:

  # ═══════════════════════════════════════════
  # MECHANISM 9: Environment Variable Verification
  # Runs before anything else. Checks that all
  # required environment variables are present
  # and correctly formatted.
  # ═══════════════════════════════════════════
  environment-verification:
    name: "M9 — Environment Variable Verification"
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify required environment variables
        run: |
          echo "=== Environment Variable Verification ==="
          MISSING=""

          check_var() {
            local name=$1
            local value=$2
            if [ -z "$value" ]; then
              echo "MISSING: $name"
              MISSING="$MISSING $name"
            else
              echo "OK: $name = $value"
            fi
          }

          check_var "JAVA_VERSION"           "${{ env.JAVA_VERSION }}"
          check_var "MAVEN_OPTS"             "${{ env.MAVEN_OPTS }}"
          check_var "APP_NAME"               "${{ env.APP_NAME }}"
          check_var "BUILD_TIMEOUT_MINUTES"  "${{ env.BUILD_TIMEOUT_MINUTES }}"
          check_var "TEST_TIMEOUT_MINUTES"   "${{ env.TEST_TIMEOUT_MINUTES }}"

          if [ -n "$MISSING" ]; then
            echo ""
            echo "FAILURE: The following required variables are missing or empty: $MISSING"
            echo "Please check the env section of the workflow file."
            exit 1
          fi

          echo ""
          echo "All environment variables verified successfully."

  # ═══════════════════════════════════════════
  # MECHANISM 8: Configuration Validation Gate
  # Validates the pom.xml and application.properties
  # before the pipeline executes its first stage.
  # ═══════════════════════════════════════════
  configuration-validation:
    name: "M8 — Configuration Validation Gate"
    runs-on: ubuntu-latest
    needs: environment-verification
    timeout-minutes: 2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate pom.xml structure
        run: |
          echo "=== Validating pom.xml ==="
          if [ ! -f "pom.xml" ]; then
            echo "FAILURE: pom.xml not found at repository root"
            exit 1
          fi

          for element in "groupId" "artifactId" "version" "dependencies" "build"; do
            if grep -q "<$element>" pom.xml; then
              echo "OK: <$element> found in pom.xml"
            else
              echo "FAILURE: <$element> missing from pom.xml"
              exit 1
            fi
          done

      - name: Validate application.properties
        run: |
          echo "=== Validating application.properties ==="
          PROPS="src/main/resources/application.properties"

          if [ ! -f "$PROPS" ]; then
            echo "FAILURE: application.properties not found"
            exit 1
          fi

          # ── M8 fix: also validate that server.port is a valid integer ────────
          # This catches the configuration failure injection BEFORE the build
          # stage runs, surfacing it as a configuration error rather than a
          # generic build failure and triggering the correct M7/M8/M9 chain.
          PORT_VALUE=$(grep "^server.port=" "$PROPS" | cut -d'=' -f2)
          if [ -n "$PORT_VALUE" ]; then
            if ! echo "$PORT_VALUE" | grep -qE '^[0-9]+$'; then
              echo "FAILURE: server.port has non-numeric value: '$PORT_VALUE'"
              echo "Valid ports are integers in the range 1-65535."
              exit 1
            fi
            echo "OK: server.port = $PORT_VALUE"
          fi

          for key in "spring.application.name" "server.port" "spring.datasource.url"; do
            if grep -q "^$key=" "$PROPS"; then
              echo "OK: $key found"
            else
              echo "FAILURE: Required key '$key' missing from application.properties"
              exit 1
            fi
          done

          echo "Configuration validation passed."

  # ═══════════════════════════════════════════
  # STAGE 1: BUILD
  # Mechanisms active:
  #   M1 — Automated retry on transient build errors
  #   M2 — Dependency version pinning with fallback
  #   M3 — Automated notification and branch lockout
  #   M11 — Dependency cache invalidation and rebuild
  # ═══════════════════════════════════════════
  build:
    name: "Stage 1 — Build"
    runs-on: ubuntu-latest
    needs: configuration-validation
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      # M11 — Dependency cache invalidation and rebuild
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        id: maven-cache
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Report cache status
        run: |
          if [ "${{ steps.maven-cache.outputs.cache-hit }}" == "true" ]; then
            echo "M11: Cache hit — using cached dependencies"
          else
            echo "M11: Cache miss — downloading fresh dependencies"
          fi

      # M1 — Automated retry on transient build errors
      # ── build output is tee'd to build.log so anomaly detection
      #    can perform keyword matching even when no explicit log file
      #    is passed (the workflow previously passed none).
      - name: Compile application
        id: compile
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: ${{ env.BUILD_TIMEOUT_MINUTES }}
          max_attempts: ${{ env.MAX_RETRIES }}
          retry_on: error
          command: mvn compile -B --no-transfer-progress 2>&1 | tee build.log

      # Upload build log as artifact so anomaly-detection job can download it.
      # This is required because each GitHub Actions job runs on a fresh runner
      # and does not share the filesystem with other jobs.
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 7

      # M3 — Automated notification and branch lockout
      - name: Notify on build failure
        if: failure()
        run: |
          echo "=== M3: Build Failure Notification ==="
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "Workflow: ${{ github.workflow }}"
          echo ""
          echo "ACTION REQUIRED: Compilation failed after ${{ env.MAX_RETRIES }} retries."
          echo "Further commits to this branch are blocked until the build is fixed."
          echo "Please check the compile step logs above for details."
          # In a real environment this would trigger a Slack/email notification
          # and a branch protection rule enforcement via GitHub API

  # ═══════════════════════════════════════════
  # STAGE 2: TEST
  # Mechanisms active:
  #   M4 — Automated retry of failed tests
  #   M5 — Flaky test quarantine
  #   M6 — Test result trend analysis
  # ═══════════════════════════════════════════
  test:
    name: "Stage 2 — Test"
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Restore Maven cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # M4 — Automated retry of failed tests
      # Revised: preserve every attempt's log and Surefire reports so that
      # fail-then-pass behaviour can be detected instead of being overwritten
      # by the final successful retry.
      - name: Run tests with preserved attempt history
        id: test
        run: |
          chmod +x scripts/run_tests_with_attempts.sh
          bash scripts/run_tests_with_attempts.sh

      # M5 — Flaky test quarantine
      - name: Analyse test results for flakiness
        if: always()
        run: |
          echo "=== M5: Flaky Test Quarantine Analysis ==="
          SUMMARY="artifacts/test-attempts/flaky_summary.json"

          if [ ! -f "$SUMMARY" ]; then
            echo "No flaky summary found — skipping flakiness analysis"
            exit 0
          fi

          python3 - <<'PY2'
          import json
          from pathlib import Path
          summary = json.loads(Path("artifacts/test-attempts/flaky_summary.json").read_text())
          print(json.dumps(summary, indent=2))
          if summary.get("flaky_detected"):
              print()
              print("FLAKY CANDIDATE DETECTED")
              tests = summary.get("failed_then_passed_tests", []) or summary.get("intermittent_tests", [])
              if tests:
                  print("Intermittent tests observed across retries/probes:")
                  for test in tests:
                      print(f"  - {test}")
              else:
                  print("Retry history indicates flaky behaviour, but per-test names were not fully recoverable.")
              print("M5 action: these tests should be quarantined or isolated from the release gate.")
          elif summary.get("always_failed_tests"):
              print("Deterministic failures detected:")
              for test in summary["always_failed_tests"]:
                  print(f"  - {test}")
          else:
              print("All attempts passed — no flaky candidates detected in this run.")
          PY2

      # M6 — Test result trend analysis
      - name: Test result trend analysis
        if: always()
        run: |
          echo "=== M6: Test Result Trend Analysis ==="
          python3 - <<'PY2'
          import json
          from pathlib import Path
          summary_path = Path("artifacts/test-attempts/flaky_summary.json")
          if not summary_path.exists():
              print("No trend data available")
              raise SystemExit(0)
          summary = json.loads(summary_path.read_text())
          print(f"Attempts executed: {summary['attempt_count']}")
          print(f"Gate success after retry: {summary['gate_success_after_retry']}")
          print(f"Probe failures observed: {summary['probe_failures_observed']}")
          print(f"Timeout observed: {summary['timeout_observed']}")
          print(f"Flaky detected: {summary['flaky_detected']}")
          print(f"Detection basis: {summary['detection_basis']}")
          if summary.get('failed_then_passed_tests'):
              print("Recovered flaky tests:")
              for test in summary['failed_then_passed_tests']:
                  print(f"  - {test}")
          if summary.get('always_failed_tests'):
              print("Still failing after all retries:")
              for test in summary['always_failed_tests']:
                  print(f"  - {test}")
          PY2

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log-${{ github.run_number }}
          path: test.log
          retention-days: 7

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ github.run_number }}
          path: target/surefire-reports/
          retention-days: 30

      - name: Upload preserved test attempt history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-attempt-history-${{ github.run_number }}
          path: artifacts/test-attempts/
          retention-days: 30
  # ═══════════════════════════════════════════
  # STAGE 3: PACKAGE
  # Mechanisms active:
  #   M10 — Fresh container reset (implicit via new runner)
  #   M12 — Timeout-based job cancellation
  # ═══════════════════════════════════════════
  package:
    name: "Stage 3 — Package"
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Restore Maven cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Package application
        run: mvn package -DskipTests -B --no-transfer-progress

      - name: Verify JAR artifact exists
        run: |
          JAR=$(find target -name "*.jar" -not -name "*sources*" | head -1)
          if [ -z "$JAR" ]; then
            echo "FAILURE: No JAR artifact found in target/"
            exit 1
          fi
          echo "JAR artifact produced: $JAR"
          ls -lh "$JAR"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: grade-management-jar-${{ github.run_number }}
          path: target/*.jar
          retention-days: 30

  # ═══════════════════════════════════════════
  # STAGE 4: DEPLOY
  # Mechanisms active:
  #   M7 — Automated rollback to last known good state
  #   M12 — Timeout-based job cancellation
  # ═══════════════════════════════════════════
  deploy:
    name: "Stage 4 — Deploy"
    runs-on: ubuntu-latest
    needs: package
    timeout-minutes: 5
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: grade-management-jar-${{ github.run_number }}
          path: target/

      - name: Simulate deployment
        id: deploy-step
        run: |
          echo "=== Deploying grade-management ==="
          JAR=$(find target -name "*.jar" -not -name "*sources*" | head -1)
          echo "Deploying artifact: $JAR"
          echo "Deployment target: GitHub Releases (simulated)"
          echo "Build number: ${{ github.run_number }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Deployment successful."

      # M7 — Automated rollback to last known good state
      - name: Rollback on deployment failure
        if: failure()
        run: |
          echo "=== M7: Automated Rollback Initiated ==="
          echo "Deployment failed. Identifying last known good commit..."

          LAST_GOOD=$(git log --oneline -5)
          echo "Recent commit history:"
          echo "$LAST_GOOD"
          echo ""
          echo "In a production environment, this step would:"
          echo "  1. Identify the last successful deployment commit"
          echo "  2. Create a revert commit automatically"
          echo "  3. Push the revert to restore the pipeline to a known good state"
          echo "  4. Notify the team of the rollback via Slack/email"
          echo ""
          echo "Rolling back to last known good state..."
          git log --oneline -1 HEAD~1 || echo "No previous commit available for rollback"

  # ═══════════════════════════════════════════
  # POST-PIPELINE: ANOMALY DETECTION
  # Mechanism active:
  #   M13 — Build log anomaly detection
  # Runs after all stages regardless of outcome.
  #
  # Fix: this job now downloads the build log and Surefire reports
  # produced by the build and test jobs, then passes the combined
  # log corpus to anomaly_detection.py. Previously no log file was
  # passed, making flaky_test classification impossible (the detector
  # fell back to stage-status analysis, which cannot distinguish
  # flaky from deterministic test failures).
  # ═══════════════════════════════════════════
  anomaly-detection:
    name: "M13 — Build Log Anomaly Detection"
    runs-on: ubuntu-latest
    needs: [ build, test, package ]
    if: always()
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Download build log from Stage 1
      - name: Download build log
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: logs/
        continue-on-error: true   # artifact may not exist if build was skipped

      # Download test log from Stage 2
      - name: Download test log
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: test-log-${{ github.run_number }}
          path: logs/
        continue-on-error: true   # artifact may not exist if test was skipped

      # Download Surefire reports from Stage 2.
      - name: Download Surefire reports
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: surefire-reports-${{ github.run_number }}
          path: target/surefire-reports/
        continue-on-error: true

      - name: Download preserved test attempt history
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: test-attempt-history-${{ github.run_number }}
          path: artifacts/test-attempts/
        continue-on-error: true

      # Merge all downloaded log files into a single corpus for the detector.
      - name: Merge log files
        if: always()
        run: |
          mkdir -p logs
          cat logs/build.log logs/test.log > logs/combined.log 2>/dev/null || true
          LINES=$(wc -l < logs/combined.log 2>/dev/null || echo 0)
          echo "Combined log corpus: $LINES lines"

      - name: Run anomaly detection script
        run: |
          echo "=== M13: Build Log Anomaly Detection ==="
          echo "build_status=${{ needs.build.result }}"     >> pipeline_status.txt
          echo "test_status=${{ needs.test.result }}"       >> pipeline_status.txt
          echo "package_status=${{ needs.package.result }}" >> pipeline_status.txt

          # Pass the merged log file as the second argument.
          # anomaly_detection.py will also automatically read
          # target/surefire-reports/ via collect_surefire_logs().
          python scripts/anomaly_detection.py pipeline_status.txt logs/combined.log

      - name: Upload anomaly detection report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: anomaly-report-${{ github.run_number }}
          path: anomaly_report.json
          retention-days: 30
